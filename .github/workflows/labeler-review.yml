# This is shit and needs cleanup but since we are technically running this after a workflow that runs on the fork and not master i kinda want to make sure we use nothing from that workflow
# Forgive me for the mess. This is overkill.
# I am future planning against shit that will never end up mattering.
name: "Labels: Approved"

on:
  workflow_run:
    workflows: ["Review Trigger"]
    types: [completed]

jobs:
  label-on-approval:
    if: |
      github.event.workflow_run.name == 'Review Trigger' &&
      github.event.workflow_run.event == 'pull_request_review' &&
      github.event.workflow_run.repository.full_name == github.repository
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
    - name: Resolve PR from workflow commit
      id: meta
      env:
        TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
      run: |
        HEAD_SHA=$(jq -r '.workflow_run.head_sha' "$GITHUB_EVENT_PATH")

        if [ -z "$HEAD_SHA" ] || [ "$HEAD_SHA" = "null" ]; then
        echo "No head_sha in workflow_run"
        exit 1
        fi

        curl -L \
        -H "Authorization: Bearer $TOKEN" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/$OWNER/$REPO/commits/$HEAD_SHA/pulls \
        -o prs.json

        TYPE=$(jq -r 'type' prs.json)

        if [ "$TYPE" != "array" ]; then
          echo "Unexpected response:"
          cat prs.json
          exit 1
        fi

        PR_NUMBER=$(jq -r '.[0].number' prs.json)

        if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
          echo "No PR associated with commit"
          cat prs.json
          exit 1
        fi

        REPO_NAME=$(jq -r '.[0].base.repo.full_name' prs.json)

        if [ "$REPO_NAME" != "$OWNER/$REPO" ]; then
        echo "PR belongs to different repository"
        exit 1
        fi

        echo "Resolved PR: $PR_NUMBER"
        echo "pr=$PR_NUMBER" >> $GITHUB_OUTPUT

    - name: Fetch reviews
      env:
        TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
        PR_NUMBER: ${{ steps.meta.outputs.pr }}
      run: |
        curl -o reviews.json -L \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/$OWNER/$REPO/pulls/$PR_NUMBER/reviews

    - name: Count approvals
      id: check-approvals
      run: |
        APPROVALS=$(jq '
          group_by(.user.login)
          | map(last)
          | map(select(.state=="APPROVED" and .user.type=="User"))
          | length
        ' reviews.json)

        echo "Number of approvals: $APPROVALS"
        echo "approvals=$APPROVALS" >> $GITHUB_OUTPUT

    - name: Add Approved Label if Enough Approvals
      if: steps.check-approvals.outputs.approvals >= 2
      uses: actions-ecosystem/action-add-labels@v1
      env:
        github_token: ${{ secrets.GITHUB_TOKEN }}
      with:
        number: ${{ steps.meta.outputs.pr }}
        labels: "S: Approved"

    - name: Remove Other Labels on Approved
      if: steps.check-approvals.outputs.approvals >= 2
      uses: actions-ecosystem/action-remove-labels@v1
      env:
        github_token: ${{ secrets.GITHUB_TOKEN }}
      with:
        number: ${{ steps.meta.outputs.pr }}
        labels: |
          "S: Needs Review"
          "S: Needs Second Approval"

    - name: Add Second Approval Requirement
      if: steps.check-approvals.outputs.approvals == 1
      uses: actions-ecosystem/action-add-labels@v1
      env:
        github_token: ${{ secrets.GITHUB_TOKEN }}
      with:
        number: ${{ steps.meta.outputs.pr }}
        labels: |
          "S: Needs Second Approval"
          "S: Needs Review"

    - name: Remove Other Labels on Second Approval
      if: steps.check-approvals.outputs.approvals == 1
      uses: actions-ecosystem/action-remove-labels@v1
      env:
        github_token: ${{ secrets.GITHUB_TOKEN }}
      with:
        number: ${{ steps.meta.outputs.pr }}
        labels: "S: Approved"

    - name: Remove All Other Labels if No Approval
      if: steps.check-approvals.outputs.approvals < 1
      uses: actions-ecosystem/action-remove-labels@v1
      env:
        github_token: ${{ secrets.GITHUB_TOKEN }}
      with:
        number: ${{ steps.meta.outputs.pr }}
        labels: |
          "S: Approved"
          "S: Needs Second Approval"
