- type: entity
  name: Eckeyiish kelpfry
  parent: FoodMealBase
  id: FoodMealThavenKelpFry
  description: All the best parts of the kelp pod- chopped and stir fried! You might want a sitter for this one!
  components:
  - type: Edible
    trash:
    - FoodPlateSmall
  - type: FlavorProfile
    flavors:
    - salty
    - bungo
    - magical
    - spicy
  - type: Sprite
    sprite: _Gardenstation/Objects/Consumable/Food/meals.rsi
    state: kelp-fry
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 25
        reagents:
        - ReagentId: Nutriment
          Quantity: 8
        - ReagentId: KelpPodSlime
          Quantity: 12
