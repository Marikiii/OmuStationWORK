- type: entity
  name: QBZ-24 Main Battle Rifle
  parent: [BaseWeaponRifle, BaseSyndicateContraband]
  id: WeaponRifleQBZ24
  description: A mass-produced Shengli service rifle built for line infantry contracts. Cheap, rugged, and utterly unremarkable in all the right ways, this ubiquitous rifle has seen service with professional militaries, mercenary outfits, and terrorist cells alike.
  components:
  - type: Sprite
    sprite: _Omu/Objects/Weapons/Guns/Rifles/QBZ-24.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Omu/Objects/Weapons/Guns/Rifles/QBZ-24.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifle
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineRifle
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeRifle
        priority: 1
        whitelist:
          tags:
          - CartridgeRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Gun
    fireRate: 6
