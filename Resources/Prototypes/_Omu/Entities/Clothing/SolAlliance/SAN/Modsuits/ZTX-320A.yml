# The Modsuit Itself
- type: entity
  parent: [ClothingModsuitStandard] #Omu, we don't have this , SolAllianceInfo]
  id: ClothingModsuitSANZTX320A
  name: ZTX-320A modsuit control
  description: The main controller for a "Mazu" modsuit. A rare and incredibly valuable piece of military hardware typically reserved for Solarian special forces.
  components:
    - type: Sprite
      sprite: _Omu/Clothing/SolAlliance/Modsuits/ZTX-320A.rsi
    - type: ExplosionResistance
      damageCoefficient: 0.5
    - type: ToggleableClothing
      clothingPrototypes:
        head: ClothingModsuitHelmetSANZTX320A
        gloves: ClothingModsuitGauntletsSANZTX320A
        outerClothing: ClothingModsuitChestplateSANZTX320A
        shoes: ClothingModsuitBootsSANZTX320A
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellHyper
          whitelist:
            components:
              - PowerCell
    - type: Storage
      maxItemSize: Huge
      grid:
        - 0,0,7,4

- type: entity
  parent: [ClothingModsuitGauntletsStandard] #Omu, we don't have this , SolAllianceInfo]
  id: ClothingModsuitGauntletsSANZTX320A
  name: ZTX-320A modsuit gauntlets
  description: A pair of gauntlets made for crushing alien skulls. It is part of the "Mazu" modsuit.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _Omu/Clothing/SolAlliance/Modsuits/ZTX-320A.rsi
    - type: DamageOnInteractProtection # Omu start
      damageProtection:
        flatReductions:
          Heat: 10
    - type: Fiber
      fiberMaterial: fibers-modular
      fiberColor: fibers-black
    - type: FingerprintMask
    - type: SealableClothing
      sealUpPopup: sealable-clothing-seal-up-gauntlets
      sealDownPopup: sealable-clothing-seal-down-gauntlets
    - type: Insulated # Omu end

- type: entity
  parent: [ClothingModsuitHelmetStandard, ShowSecurityIcons] # Omu, we don't have this, SolAllianceInfo, BaseClothingRadio]
  id: ClothingModsuitHelmetSANZTX320A
  name: ZTX-320A modsuit helmet
  description: A state-of-the-art helmet designed by CyberSun Armaments for the "Mazu" modsuit. It includes a built-in HUD.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _Omu/Clothing/SolAlliance/Modsuits/ZTX-320A.rsi
    - type: Armor
      traumaDeductions: # Omu start
        Dismemberment: 0.3
        OrganDamage: 0.3
        BoneDamage: 0.3
        VeinsDamage: 0
        NerveDamage: 0 # Omu end
      modifiers:
        coefficients:
          Blunt: 0.3 # Omu start
          Slash: 0.3
          Piercing: 0.3
          Heat: 0.3
          Radiation: 0.3
          Caustic: 0.3 # Omu end
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        head:
          - state: equipped-HEAD-sealed
    - type: ShowHealthBars
      damageContainers:
        - Biological
    - type: ComponentToggler # Omu start
      components:
      - type: BreathMask
      - type: PressureProtection
        highPressureMultiplier: 0.3
        lowPressureMultiplier: 1000
      - type: TemperatureProtection
        heatingCoefficient: 0.01
        coolingCoefficient: 0.01
      - type: IdentityBlocker
      - type: IngestionBlocker
      - type: HideLayerClothing
        slots:
        - Hair
        - Snout
        - HeadTop
        - HeadSide
      #THIS WILL BE REPLACED WITH MODULE ↓↓
    - type: ToggleableVisuals
      spriteLayer: light
    - type: ItemTogglePointLight
    - type: PointLight
      color: "#FF4500"
      enabled: false
      radius: 5
      energy: 3
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      netsync: false # Omu, this needs to be false for our fix to work.
    - type: HandheldLight
      addPrefix: true
      blinkingBehaviourId: blinking
      radiatingBehaviourId: radiating
    - type: LightBehaviour
      behaviours:
        - !type:FadeBehaviour
          id: radiating
          interpolate: Linear
          maxDuration: 2.0
          startValue: 3.0
          endValue: 2.0
          isLooped: true
          reverseWhenFinished: true
        - !type:PulseBehaviour
          id: blinking
          interpolate: Nearest
          maxDuration: 1.0
          startValue: 0.1
          endValue: 2.0
          isLooped: true
    - type: Battery
      maxCharge: 600 #lights drain 3/s but recharge of 2 makes this 1/s. Therefore 600 is 10 minutes of light.
      startingCharge: 600
    - type: BatterySelfRecharger
      autoRecharge: true
      autoRechargeRate: 2 # Omu end

- type: entity
  parent: [ClothingModsuitChestplateStandard] #Omu, we don't have this , SolAllianceInfo]
  id: ClothingModsuitChestplateSANZTX320A
  name: ZTX-320A modsuit chestplate
  description: A state of the art chestplate for the "Mazu" Modsuit. It uses the same armor plating as a "Shanlin" tacsuit, but also incorporates powered servos to reduce the equipment load.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _Omu/Clothing/SolAlliance/Modsuits/ZTX-320A.rsi
      layers: # Omu start
      - state: chestplate
      - state: chestplate-sealed
        visible: false
        map: [ "sealed" ]
    - type: Clothing
      equipSound: /Audio/Mecha/mechmove03.ogg
      unequipSound: /Audio/Mecha/mechmove03.ogg
      slots: [ outerClothing ]
    - type: SealableClothing
      sealUpPopup: sealable-clothing-seal-up-chestplate
      sealDownPopup: sealable-clothing-seal-down-chestplate
    - type: ExplosionResistance
      damageCoefficient: 0.4
    - type: ModifyDelayedKnockdown
      delayDelta: 3
      knockdownTimeDelta: -3
    - type: StaminaResistance
      damageCoefficient: 0.4 # Omu end
    - type: ClothingSpeedModifier
      walkModifier: 0.7
      sprintModifier: 0.7
    - type: Armor
      traumaDeductions: # Omu start
        Dismemberment: 0.3
        OrganDamage: 0.3
        BoneDamage: 0.3
        VeinsDamage: 0
        NerveDamage: 0
      coverage:
        - Chest
        - Groin
        - Arm
        - Hand
        - Leg
        - Foot
        - Tail
        - Other # Omu end
      modifiers:
        coefficients:
          Blunt: 0.30
          Slash: 0.30
          Piercing: 0.30
          Heat: 0.30
          Radiation: 0.30
          Caustic: 0.30
    - type: TemperatureProtection
      heatingCoefficient: 0.1
      coolingCoefficient: 0.1
#    - type: StaminaDamageResistance
#      coefficient: 0.5
#    - type: EmitsSoundOnMove # Omu, we don't have this
#      soundCollection:
#        collection: FootstepHardsuitMedium
#        params:
#          volume: -5
#      requiresWorn: true
#      distanceWalking: 2
#      distanceSprinting: 3
    - type: ComponentToggler # Omu start
      components:
      - type: PressureProtection
        highPressureMultiplier: 0.3
        lowPressureMultiplier: 1000
      - type: TemperatureProtection
        coolingCoefficient: 0.01
        heatingCoefficient: 0.01
      - type: FireProtection
        reduction: 0.5 # Omu end

- type: entity
  parent: [ClothingModsuitBootsStandard] #Omu, we don't have this , SolAllianceInfo]
  id: ClothingModsuitBootsSANZTX320A
  name: ZTX-320A modsuit boots
  description: A state-of-the-art pair of magboots for the "Mazu" modsuit. So long as the suit is powered, these will not slow the wearer down.
  categories: [HideSpawnMenu]
  components:
    - type: Appearance
    - type: Sprite
      sprite: _Omu/Clothing/SolAlliance/Modsuits/ZTX-320A.rsi
      layers: # Omu start
        - state: boots
        - state: boots-sealed
          map: [ "sealed" ]
    - type: Clothing
      equipSound: /Audio/Mecha/mechmove03.ogg
      unequipSound: /Audio/Mecha/mechmove03.ogg
      slots: [ feet ]
    - type: SealableClothing
      sealUpPopup: sealable-clothing-seal-up-boots
      sealDownPopup: sealable-clothing-seal-down-boots
    - type: ClothingSlowOnDamageModifier
      modifier: 0.5
    - type: ModifyStandingUpTime
      multiplier: 0.5
    - type: Armor
      traumaDeductions:
        Dismemberment: 0.1
        OrganDamage: 0.1
        BoneDamage: 0.1
        VeinsDamage: 0
        NerveDamage: 0
      modifiers:
        coefficients:
          Blunt: 0.9
          Slash: 0.9
          Piercing: 0.9 # Omu end
    - type: Tag
      tags:
        - WhitelistChameleon

